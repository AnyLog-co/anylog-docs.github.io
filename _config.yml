title: AnyLog Docs
description: Technical documentation for AnyLog Edge Data Fabric
baseurl: ''
url: https://anylog-docs.github.io
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
collections:
  docs:
    output: true
    permalink: /docs/:name/
defaults:
- scope:
    path: ''
    type: docs
  values:
    layout: page
plugins:
- jekyll-feed
- jekyll-seo-tag
exclude:
- Gemfile
- Gemfile.lock
- README.md
- vendor
nav:
- title: Getting Started
  items:
  - slug: getting-started
    title: Introduction to AnyLog
    file: Getting Started/getting-started.md
  - slug: installing-anylog
    title: Installing & Deploying AnyLog
    file: Getting Started/installing-anylog.md
  - slug: deployment-scripts
    title: Deployment Scripts
    file: Getting Started/deployment-scripts.md
- title: Network & Services
  items:
  - slug: background-services
    title: Background Services
    file: Network & Services/background-services.md
  - slug: blockchain
    title: Blockchain & Metadata
    file: Network & Services/blockchain.md
- title: Managing Data (Southbound)
  items:
  - slug: data-ingestion
    title: Data Ingestion
    file: Managing Data (Southbound)/data-ingestion.md
  - slug: opcua
    title: OPC-UA
    file: Managing Data (Southbound)/opcua.md
  - slug: grpc
    title: gRPC
