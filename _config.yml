title: AnyLog Docs
description: Technical documentation for AnyLog Edge Data Fabric
baseurl: ''
url: https://anylog-docs.github.io
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
collections:
  docs:
    output: true
    permalink: /docs/:name/
defaults:
- scope:
    path: ''
    type: docs
  values:
    layout: page
plugins:
- jekyll-feed
- jekyll-seo-tag
exclude:
- Gemfile
- Gemfile.lock
- README.md
- vendor
nav:
- title: Getting Started
  items:
  - slug: introduction
    title: Introduction to AnyLog
  - slug: installing-anylog
    title: Installing & Deploying
- title: Managing Data
  items:
  - slug: data-ingestion
    title: Ingestion & msg client
  - slug: opcua
    title: OPC-UA
- title: Network & Services
  items:
  - slug: background-services
    title: Background Services
  - slug: blockchain
    title: Blockchain
- title: Querying Data (Northbound)
  items:
  - slug: queries
    title: Querying Data (Northbound)
  - slug: using-rest
    title: Using Rest
  - slug: README
    title: Readme
  - slug: grafana
    title: Grafana
- title: Monitoring & Operations
  items:
  - slug: aggregations
    title: Aggregations
  - slug: high-availability
    title: High Availability
- title: Tools & UI
  items:
  - slug: remote-gui
    title: Remote GUI
- title: Managing Data (Southbound)
  items:
  - slug: grpc
    title: Grpc
  - slug: live_data_generator
    title: Live Data Generator
  - slug: node-red
    title: Node Red
  - slug: syslog
    title: Syslog
  - slug: video-streaming
    title: Video Streaming
- title: Tools & Ui
  items: []
