title: AnyLog Docs
description: Technical documentation for AnyLog Edge Data Fabric
baseurl: ''
url: https://anylog-docs.github.io
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
collections:
  docs:
    output: true
    permalink: /docs/:path/
defaults:
- scope:
    path: ''
    type: docs
  values:
    layout: page
plugins:
- jekyll-feed
- jekyll-seo-tag
- relative_links
exclude:
- Gemfile
- Gemfile.lock
- README.md
- vendor
include:
- assets/img/node_configs.env
