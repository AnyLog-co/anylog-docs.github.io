<svg class="network-fabric-illustration" width="100%" viewBox="0 0 760 340" role="img" aria-labelledby="fabric-title fabric-desc" xmlns="http://www.w3.org/2000/svg">
<title id="fabric-title">AnyLog industrial edge data fabric</title>
<desc id="fabric-desc">Manufacturing, oil and gas, smart city, recycling plant, and edge AI sites exchanging live data through the AnyLog fabric.</desc>
<defs>
  <linearGradient id="fabric-panel" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f7fbff"/>
    <stop offset="52%" stop-color="#f2fbf7"/>
    <stop offset="100%" stop-color="#f8f6ff"/>
  </linearGradient>
  <linearGradient id="fabric-core" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#3a9fd6"/>
    <stop offset="55%" stop-color="#1d9e75"/>
    <stop offset="100%" stop-color="#7f77dd"/>
  </linearGradient>
  <radialGradient id="core-glow" cx="50%" cy="50%" r="65%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity=".9"/>
    <stop offset="55%" stop-color="#58c7b0" stop-opacity=".36"/>
    <stop offset="100%" stop-color="#3a9fd6" stop-opacity="0"/>
  </radialGradient>
  <filter id="soft-shadow" x="-20%" y="-30%" width="140%" height="170%">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0d1b2e" flood-opacity=".12"/>
  </filter>
  <filter id="pulse-glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="2.3" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M2 1 L8 5 L2 9" fill="none" stroke="#1d9e75" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <pattern id="fabric-grid" width="28" height="28" patternUnits="userSpaceOnUse">
    <path d="M28 0H0V28" fill="none" stroke="#d7e4ef" stroke-width=".7" opacity=".45"/>
  </pattern>
</defs>

<style>
  .network-fabric-illustration {
    color: var(--text, #1a2535);
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow: visible;
  }
  .fabric-bg { fill: url(#fabric-panel); stroke: var(--border, #dde3ec); }
  .fabric-grid { fill: url(#fabric-grid); opacity: .72; }
  .route {
    fill: none;
    stroke-linecap: round;
    stroke-width: 1.7;
    stroke-dasharray: 5 8;
    opacity: .58;
    animation: route-drift 12s linear infinite;
  }
  .route-blue { stroke: #378add; }
  .route-teal { stroke: #1d9e75; }
  .route-gold { stroke: #d6982d; }
  .route-slate { stroke: #65758b; }
  .route-purple { stroke: #7f77dd; }
  .site-card {
    fill: var(--surface-raised, #ffffff);
    stroke: var(--border, #dde3ec);
    filter: url(#soft-shadow);
  }
  .site-title {
    fill: var(--text, #1a2535);
    font-size: 12px;
    font-weight: 600;
  }
  .site-meta {
    fill: var(--text-muted, #56657a);
    font-size: 8.7px;
    font-weight: 500;
  }
  .icon-line {
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-width: 2;
  }
  .icon-fill { opacity: .13; }
  .core-halo {
    transform-box: fill-box;
    transform-origin: center;
    animation: core-breathe 4.8s ease-in-out infinite;
  }
  .core-node {
    transform-box: fill-box;
    transform-origin: center;
    animation: core-float 6.2s ease-in-out infinite;
  }
  .pulse {
    filter: url(#pulse-glow);
    opacity: .95;
  }
  .return-pulse {
    filter: url(#pulse-glow);
    opacity: .82;
  }
  .core-logo {
    opacity: .96;
  }
  .sensor-dot {
    transform-box: fill-box;
    transform-origin: center;
    animation: sensor-blink 2.7s ease-in-out infinite;
  }
  .sensor-dot:nth-of-type(2n) { animation-delay: .7s; }
  .sensor-dot:nth-of-type(3n) { animation-delay: 1.4s; }

  @keyframes route-drift {
    to { stroke-dashoffset: -104; }
  }
  @keyframes core-breathe {
    50% { opacity: .78; transform: scale(1.07); }
  }
  @keyframes core-float {
    50% { transform: translateY(-3px); }
  }
  @keyframes sensor-blink {
    0%, 100% { opacity: .38; transform: scale(.86); }
    45% { opacity: 1; transform: scale(1.18); }
  }

  [data-theme="dark"] .fabric-bg { fill: #111923; stroke: #30363d; }
  [data-theme="dark"] .fabric-grid { opacity: .26; }
  [data-theme="dark"] .site-card { fill: #161b22; stroke: #30363d; }
  [data-theme="dark"] .route { opacity: .72; }
</style>

<rect class="fabric-bg" x="16" y="18" width="728" height="304" rx="14"/>
<rect class="fabric-grid" x="30" y="32" width="700" height="276" rx="10"/>

<!-- Routes -->
<path id="route-mfg" class="route route-blue" d="M234 92 C278 102 309 137 323 174"/>
<path id="route-oil" class="route route-gold" d="M526 92 C482 102 451 137 437 174"/>
<path id="route-city" class="route route-teal" d="M236 256 C278 252 309 229 326 204"/>
<path id="route-recycle" class="route route-slate" d="M524 256 C482 252 451 229 434 204"/>
<path id="route-ai" class="route route-purple" d="M380 103 C379 124 379 145 379 162"/>
<path id="return-mfg" d="M323 174 C309 137 278 102 234 92" fill="none"/>
<path id="return-oil" d="M437 174 C451 137 482 102 526 92" fill="none"/>
<path id="return-city" d="M326 204 C309 229 278 252 236 256" fill="none"/>
<path id="return-recycle" d="M434 204 C451 229 482 252 524 256" fill="none"/>
<path id="return-ai" d="M379 162 C379 145 379 124 380 103" fill="none"/>
<path id="route-cross-1" class="route route-teal" d="M142 126 C205 184 260 207 323 193" opacity=".34"/>
<path id="route-cross-2" class="route route-blue" d="M618 218 C558 185 500 161 437 191" opacity=".34"/>

<!-- Animated data packets -->
<g>
  <circle class="pulse" r="4.2" fill="#378add">
    <animateMotion dur="3.2s" repeatCount="indefinite" begin="0s"><mpath href="#route-mfg"/></animateMotion>
  </circle>
  <circle class="pulse" r="3.3" fill="#85b7eb">
    <animateMotion dur="4.4s" repeatCount="indefinite" begin="1.1s"><mpath href="#route-mfg"/></animateMotion>
  </circle>
  <circle class="pulse" r="4.2" fill="#d6982d">
    <animateMotion dur="3.6s" repeatCount="indefinite" begin=".4s"><mpath href="#route-oil"/></animateMotion>
  </circle>
  <circle class="pulse" r="3.5" fill="#ffba54">
    <animateMotion dur="4.8s" repeatCount="indefinite" begin="1.8s"><mpath href="#route-oil"/></animateMotion>
  </circle>
  <circle class="pulse" r="4.2" fill="#1d9e75">
    <animateMotion dur="3.4s" repeatCount="indefinite" begin=".8s"><mpath href="#route-city"/></animateMotion>
  </circle>
  <circle class="pulse" r="3.4" fill="#5dcaa5">
    <animateMotion dur="4.7s" repeatCount="indefinite" begin="2.2s"><mpath href="#route-city"/></animateMotion>
  </circle>
  <circle class="pulse" r="4.2" fill="#65758b">
    <animateMotion dur="3.7s" repeatCount="indefinite" begin=".2s"><mpath href="#route-recycle"/></animateMotion>
  </circle>
  <circle class="pulse" r="3.4" fill="#a0aab8">
    <animateMotion dur="4.5s" repeatCount="indefinite" begin="1.5s"><mpath href="#route-recycle"/></animateMotion>
  </circle>
  <circle class="pulse" r="4.4" fill="#7f77dd">
    <animateMotion dur="2.8s" repeatCount="indefinite" begin=".6s"><mpath href="#route-ai"/></animateMotion>
  </circle>
  <circle class="return-pulse" r="3.5" fill="#85b7eb">
    <animateMotion dur="4.1s" repeatCount="indefinite" begin=".7s"><mpath href="#return-mfg"/></animateMotion>
  </circle>
  <circle class="return-pulse" r="3.5" fill="#ffba54">
    <animateMotion dur="4.3s" repeatCount="indefinite" begin="1.3s"><mpath href="#return-oil"/></animateMotion>
  </circle>
  <circle class="return-pulse" r="3.5" fill="#5dcaa5">
    <animateMotion dur="4.2s" repeatCount="indefinite" begin="1.8s"><mpath href="#return-city"/></animateMotion>
  </circle>
  <circle class="return-pulse" r="3.5" fill="#a0aab8">
    <animateMotion dur="4.4s" repeatCount="indefinite" begin="2.1s"><mpath href="#return-recycle"/></animateMotion>
  </circle>
  <circle class="return-pulse" r="3.5" fill="#afa9ec">
    <animateMotion dur="3.4s" repeatCount="indefinite" begin="1.1s"><mpath href="#return-ai"/></animateMotion>
  </circle>
</g>

<!-- Central AnyLog fabric -->
<g class="core-node">
  <ellipse class="core-halo" cx="380" cy="187" rx="128" ry="76" fill="url(#core-glow)"/>
  <path d="M308 136 H452 L492 187 L452 238 H308 L268 187 Z" fill="url(#fabric-core)" opacity=".98" filter="url(#soft-shadow)"/>
  <path d="M308 136 H452 L492 187 L452 238 H308 L268 187 Z" fill="none" stroke="#ffffff" stroke-opacity=".58" stroke-width="1.4"/>
  <path d="M310 187 L344 162 H416 L450 187 L416 214 H344 Z" fill="none" stroke="#ffffff" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" opacity=".86"/>
  <image class="core-logo" href="/assets/img/logo-circle-blue.png" x="287" y="178" width="18" height="18" preserveAspectRatio="xMidYMid meet"/>
  <image class="core-logo" href="/assets/img/logo-circle-blue.png" x="328" y="142" width="18" height="18" preserveAspectRatio="xMidYMid meet"/>
  <image class="core-logo" href="/assets/img/logo-circle-blue.png" x="414" y="142" width="18" height="18" preserveAspectRatio="xMidYMid meet"/>
  <image class="core-logo" href="/assets/img/logo-circle-blue.png" x="455" y="178" width="18" height="18" preserveAspectRatio="xMidYMid meet"/>
  <image class="core-logo" href="/assets/img/logo-circle-blue.png" x="414" y="216" width="18" height="18" preserveAspectRatio="xMidYMid meet"/>
  <image class="core-logo" href="/assets/img/logo-circle-blue.png" x="328" y="216" width="18" height="18" preserveAspectRatio="xMidYMid meet"/>
  <text x="380" y="185" text-anchor="middle" fill="#ffffff" font-size="12.8" font-weight="700">AnyLog</text>
  <text x="380" y="199" text-anchor="middle" fill="#ffffff" font-size="8.2" font-weight="600" opacity=".88">EDGE DATA FABRIC</text>
</g>

<!-- Manufacturing -->
<g transform="translate(44 54)">
  <rect class="site-card" width="190" height="76" rx="8"/>
  <rect x="16" y="35" width="42" height="21" fill="#378add" class="icon-fill"/>
  <path class="icon-line" stroke="#378add" d="M16 56 V36 L27 27 V36 L40 27 V36 L55 27 V56 H16 Z M24 56 V47 H31 M39 56 V47 H47"/>
  <circle class="sensor-dot" cx="68" cy="38" r="3" fill="#378add"/>
  <text class="site-title" x="78" y="31">Manufacturing</text>
  <text class="site-meta" x="78" y="48">PLC, OPC-UA, quality</text>
</g>

<!-- Oil and gas -->
<g transform="translate(526 54)">
  <rect class="site-card" width="190" height="76" rx="8"/>
  <path d="M22 58 L38 22 L54 58 Z" fill="#d6982d" class="icon-fill"/>
  <path class="icon-line" stroke="#d6982d" d="M22 58 L38 22 L54 58 M29 43 H47 M33 34 H43 M28 58 H58 M38 22 V15 M58 58 C66 53 66 46 59 42"/>
  <circle class="sensor-dot" cx="65" cy="31" r="3" fill="#d6982d"/>
  <text class="site-title" x="76" y="31">Oil &amp; Gas</text>
  <text class="site-meta" x="76" y="48">wells, pumps, telemetry</text>
</g>

<!-- Edge AI -->
<g transform="translate(292 35)">
  <rect class="site-card" width="176" height="68" rx="8"/>
  <rect x="22" y="20" width="32" height="28" rx="5" fill="#7f77dd" class="icon-fill"/>
  <path class="icon-line" stroke="#7f77dd" d="M26 21 H50 V47 H26 Z M20 27 H26 M20 35 H26 M20 43 H26 M50 27 H56 M50 35 H56 M50 43 H56 M33 16 V21 M43 16 V21 M33 47 V53 M43 47 V53"/>
  <path class="icon-line" stroke="#7f77dd" d="M34 35 L38 31 L44 37"/>
  <circle class="sensor-dot" cx="38" cy="35" r="2.8" fill="#7f77dd"/>
  <text class="site-title" x="70" y="28">Edge AI</text>
  <text class="site-meta" x="70" y="45">models near machines</text>
</g>

<!-- Smart city -->
<g transform="translate(44 216)">
  <rect class="site-card" width="192" height="76" rx="8"/>
  <rect x="18" y="30" width="13" height="27" fill="#1d9e75" class="icon-fill"/>
  <rect x="36" y="21" width="17" height="36" fill="#1d9e75" class="icon-fill"/>
  <rect x="58" y="38" width="12" height="19" fill="#1d9e75" class="icon-fill"/>
  <path class="icon-line" stroke="#1d9e75" d="M16 57 H72 M23 57 V31 H32 V57 M39 57 V22 H53 V57 M60 57 V39 H70 V57 M81 31 C90 39 90 49 81 57 M77 39 C81 43 81 47 77 51"/>
  <circle class="sensor-dot" cx="83" cy="44" r="3" fill="#1d9e75"/>
  <text class="site-title" x="92" y="31">Smart City</text>
  <text class="site-meta" x="92" y="48">traffic, power, water</text>
</g>

<!-- Recycling plant -->
<g transform="translate(524 216)">
  <rect class="site-card" width="192" height="76" rx="8"/>
  <path class="icon-line" stroke="#65758b" marker-end="url(#arrow-teal)" d="M36 24 C48 22 58 30 60 42"/>
  <path class="icon-line" stroke="#65758b" marker-end="url(#arrow-teal)" d="M57 49 C50 59 36 61 27 53"/>
  <path class="icon-line" stroke="#65758b" marker-end="url(#arrow-teal)" d="M23 47 C18 36 23 26 32 23"/>
  <circle class="sensor-dot" cx="41" cy="42" r="4" fill="#1d9e75"/>
  <text class="site-title" x="76" y="31">Recycling Plant</text>
  <text class="site-meta" x="76" y="48">sorting, scales, reuse</text>
</g>
</svg>
