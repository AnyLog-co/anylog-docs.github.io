name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write        # changed from read — needed to push synced files
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ── NEW: runs first, before validate ────────────────────────────
  sync-changelogs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.SHARED_DOCS_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync CHANGELOGs from source repos
        env:
          GH_TOKEN: ${{ secrets.SHARED_DOCS_PAT }}
        run: python .github/scripts/sync_changelogs.py

      - name: Commit synced CHANGELOGs
        run: |
          git config user.name  "anylog-ci-bot[bot]"
          git config user.email "anylog-ci-bot[bot]@users.noreply.github.com"
          git add _docs/Version-Control/
          git diff --cached --quiet && echo "No changes" || \
            git commit -s -m "chore: sync CHANGELOGs [skip ci]"
          git push
  # ── END NEW ─────────────────────────────────────────────────────

  validate:
    runs-on: ubuntu-latest
    needs: sync-changelogs       # wait for sync before validating
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pyyaml
      - name: Validate ToC and internal links
        run: python .github/scripts/validate_docs.py

  build:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main              # re-checkout after sync commit
      - name: Setup Ruby
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5