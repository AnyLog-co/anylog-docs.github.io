name: Sync CHANGELOGs from source repos

on:
  push:
    branches-ignore: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  workflow_call:
#  repository_dispatch:
#    types: [changelog-updated]
#  schedule:
#    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ANYLOG_APP_ID }}
          private-key: ${{ secrets.MOSHE_PEM }}
          owner: AnyLog-co
          repositories: >-
            anylog-docs.github.io,
            AnyLog-Network,
            docker-compose,
            deployment-scripts

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Authenticate git
        run: |
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/AnyLog-co/anylog-docs.github.io.git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync CHANGELOGs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python .github/scripts/sync_changelog.py

      - name: Commit if changed
        run: |
          git config user.name  "anylog-ci-bot[bot]"
          git config user.email "anylog-ci-bot[bot]@users.noreply.github.com"
          git add _docs/Version-Control/
          git diff --cached --quiet && echo "No changes" || \
            git commit -s -m "chore: sync CHANGELOGs from source repos [skip ci]"
          git push