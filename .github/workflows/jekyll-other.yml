name: Validate docs + Jekyll (non-main)

on:
  push:
    branches-ignore: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write        # changed from read — needed to push synced files

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SHARED_DOCS_PAT }}   # needed to push

      # ── NEW ──────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync CHANGELOGs from source repos
        env:
          GH_TOKEN: ${{ secrets.SHARED_DOCS_PAT }}
        run: python .github/scripts/sync_changelogs.py

      - name: Commit synced CHANGELOGs
        run: |
          git config user.name  "anylog-ci-bot[bot]"
          git config user.email "anylog-ci-bot[bot]@users.noreply.github.com"
          git add _docs/Version-Control/
          git diff --cached --quiet && echo "No changes" || \
            git commit -s -m "chore: sync CHANGELOGs [skip ci]"
          git push
      # ── END NEW ──────────────────────────────────────────────────

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Validate ToC and internal links
        run: python .github/scripts/validate_docs.py

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Install gems
        run: bundle install

      - name: Jekyll doctor
        run: bundle exec jekyll doctor

      - name: Jekyll build (validation only)
        run: bundle exec jekyll build --trace
        env:
          JEKYLL_ENV: production